server {
    listen 80;
    server_name localhost 127.0.0.1 prod-nginx.nickmoreton-production.orb.local;

    client_max_body_size 10m;

    location /static/ {
        alias /srv/static/;
        access_log off;
        expires 1h;
        add_header Cache-Control "public";
    }

    location /media/ {
        alias /srv/media/;
        expires 1h;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://prod-app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
